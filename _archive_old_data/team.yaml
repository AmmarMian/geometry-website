# ---- Team page ----
intro_en: "Two laboratories, six researchers \u2014 experts in Riemannian and differential geometry, machine learning, statistical signal processing and remote sensing."
intro_fr: "Deux laboratoires, six chercheurs \u2014 experts en g\u00e9om\u00e9trie riemannienne et diff\u00e9rentielle, apprentissage automatique, traitement statistique du signal et t\u00e9l\u00e9d\u00e9tection."

chairs:
  - name: Nicolas Le Bihan
    affil_en: "Directeur de Recherche CNRS \u00b7 GAIA, Gipsa-lab UMR 5216, UGA"
    affil_fr: "Directeur de recherche CNRS \u00b7 GAIA, Gipsa-lab UMR 5216, UGA"
    bio_en: "Geometric processing of multivariate signals, with emphasis on bivariate signal analysis and polarization-aware algorithm design. Principal investigator of the ANR RICOCHET project (2022\u20132026)."
    bio_fr: "Traitement g\u00e9om\u00e9trique des signaux multivari\u00e9s, avec un accent sur l'analyse des signaux bivari\u00e9s et la conception d'algorithmes sensibles \u00e0 la polarisation. Porteur du projet ANR RICOCHET (2022\u20132026)."
    url: "#"
  - name: Guillaume Ginolhac
    affil_en: "Professor \u00b7 LISTIC, Universit\u00e9 Savoie Mont Blanc"
    affil_fr: "Professeur \u00b7 LISTIC, Universit\u00e9 Savoie Mont Blanc"
    bio_en: "Statistical learning based on Riemannian geometry and robust statistics, applied to remote sensing \u2014 SAR imagery and time series in particular. Principal investigator of the ANR ASTRID MARGARITA project (2018\u20132022)."
    bio_fr: "Apprentissage statistique fond\u00e9 sur la g\u00e9om\u00e9trie riemannienne et les statistiques robustes, appliqu\u00e9 \u00e0 la t\u00e9l\u00e9d\u00e9tection \u2014 imagerie SAR et s\u00e9ries temporelles en particulier. Porteur du projet ANR ASTRID MARGARITA (2018\u20132022)."
    url: "#"

