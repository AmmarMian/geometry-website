# ---- Look (baked into CSS at build time) ----
look:
  accent: "#4a6741"                                   # any hex; used for links, badges, 3D accent
  font_display: "'Space Grotesk', 'IBM Plex Sans', sans-serif"

# ---- Landing-page 3D hero (see README for options) ----
# variant: torus | flow (sphere) — the only two exposed on the landing page.
# On load a random one is picked; visitors can switch via a small marker bottom-left of the hero.
hero:
  variant: torus        # torus | flow
  motion: scroll        # scroll | orbit | drift | still
  surface: grid         # grid | none | glass
  zoom: 0.88
  speed: 0.4
  density: 0.4
  trail: 55
  thickness: 4

