{{ $s := .Site.Data.site }}
{{ $accent := $s.look.accent }}
{{ $font := $s.look.font_display }}
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ if .IsHome }}{{ $s.name }} — {{ .Params.hero_title }}{{ else }}{{ .Title }} · {{ $s.name }}{{ end }}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400;1,8..60,500&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600&family=IBM+Plex+Serif:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --paper:#f7f4ee; --card:#fbf9f4; --ink:#26241f; --body:#3d382f; --body2:#4c473c; --muted:#6f6a5e; --faint:#a89f8c;
    --line:#e4ded0; --line2:#d8d1c1; --link:#2b4a6f; --nav-bg:rgba(247,244,238,0.92);
    --accent: {{ $accent }}; --accent-line: {{ $accent }}59; --accent-bg: {{ $accent }}0d;
    --font-display: {{ $font | safeCSS }}; --font-mono:'IBM Plex Mono', monospace; --font-body:'IBM Plex Sans', system-ui, sans-serif;
  }
  html[data-theme="dark"] {
    --paper:#16140f; --card:#1e1b15; --ink:#eae4d6; --body:#cdc6b6; --body2:#c2bba9; --muted:#9a9280; --faint:#6b6455;
    --line:#2e2a22; --line2:#3a352b; --accent:#c98a68; --link:#8fafd1; --accent-line:rgba(201,138,104,0.4); --accent-bg:rgba(201,138,104,0.08); --nav-bg:rgba(22,20,15,0.9); color-scheme: dark;
  }
  body { margin: 0; background: var(--paper); color: var(--ink); font-family: var(--font-body); -webkit-font-smoothing: antialiased; transition: background 0.3s, color 0.3s; }
  a { color: var(--link); } a:hover { color: var(--accent); }
  .prose-p18 p { margin: 0 0 18px; }
  .prose-p18 p:last-child { margin-bottom: 0; }
  .wp-body h2 { font-family: var(--font-display); font-weight: 500; font-size: 22px; margin: 0 0 16px; padding-top: 40px; margin-top: 40px; border-top: 1px solid var(--line); scroll-margin-top: 96px; }
  .wp-body h2:first-child { padding-top: 0; margin-top: 0; border-top: none; }
  .wp-body p { font-size: 15.5px; line-height: 1.8; color: var(--body); margin: 0 0 18px; max-width: 70ch; }
  .wp-body ul { margin: 0; padding-left: 20px; font-size: 15.5px; line-height: 1.75; color: var(--body); display: flex; flex-direction: column; gap: 14px; max-width: 70ch; }
  .wp-body strong { font-weight: 600; }
  .wp-toc nav, .wp-toc ul { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 9px; }
  .wp-toc a { font-size: 13px; color: var(--muted); text-decoration: none; }
  .wp-toc a:hover { color: var(--accent); }
  geo-hero[data-hero-fixed] { opacity: 0.7; }
  @media (max-width: 900px) { geo-hero[data-hero-fixed] { opacity: 0.4; } }
  ::selection { background: rgba(122,146,178,0.25); }
  html, body { overflow-x: hidden; max-width: 100%; }
  @media (max-width: 640px) {
    [data-wprow] { grid-template-columns: 1fr !important; gap: 14px !important; }
    [data-rgrid] { grid-template-columns: 1fr !important; }
  }
  @media (max-width: 900px) {
    [data-wpgrid] { grid-template-columns: 1fr !important; gap: 32px !important; }
    [data-wpgrid] aside { position: static !important; }
    [data-wpgrid] aside nav { flex-direction: row !important; flex-wrap: wrap; gap: 14px !important; }
  }
</style>
<script>
  document.documentElement.dataset.theme = (function(){ try { return localStorage.getItem('geoTheme') || 'light'; } catch(e) { return 'light'; } })();
</script>
<script src="https://cdn.jsdelivr.net/npm/animejs@3.2.2/lib/anime.min.js" defer></script>
<script src="{{ "js/hero3d.js" | relURL }}" defer></script>
<script src="{{ "js/site.js" | relURL }}" defer></script>
